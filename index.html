<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BankSoal — Blok Muskuloskeletal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f6f3ee; --bg2:#ede7dc; --surface:#fefcf8; --border:#d8d0bd;
  --ink:#1c2b2a; --dim:#6b7a72; --accent:#a8442f; --accent2:#1f4b48;
  --good:#2f6d4f; --good-bg:#dcecdf; --bad:#a8442f; --bad-bg:#f3ddd6;
  --gold:#b08a3e; --radius:8px; --shadow:0 1px 3px rgba(0,0,0,0.06);
  font:16px/1.6 'Inter','system-ui',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--ink);min-height:100vh;}
a{color:var(--accent2);text-decoration:none;}
a:hover{text-decoration:underline;}
.layout{display:flex;min-height:100vh;}
/* ── SIDEBAR ── */
.sidebar{
  width:260px;background:var(--surface);border-right:1px solid var(--border);
  padding:0;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;
}
.sidebar .brand{
  padding:20px 18px 14px;border-bottom:1px solid var(--border);
  font-size:13px;letter-spacing:.08em;text-transform:uppercase;color:var(--dim);
}
.sidebar .brand strong{display:block;font-size:18px;color:var(--accent2);text-transform:none;letter-spacing:0;margin-top:2px;}
.sidebar nav{flex:1;overflow-y:auto;padding:8px 0;}
.nav-item{
  display:flex;align-items:center;gap:10px;padding:10px 18px;cursor:pointer;
  font-size:14px;color:var(--ink);border:none;background:none;width:100%;text-align:left;
  transition:background .12s;
}
.nav-item:hover{background:var(--bg2);}
.nav-item.active{background:var(--bg2);color:var(--accent2);font-weight:600;border-right:3px solid var(--accent);}
.nav-item .icon{font-size:18px;width:24px;text-align:center;}
.nav-item .badge{
  margin-left:auto;font-size:11px;background:var(--bg2);padding:1px 8px;border-radius:10px;
  font-family:'JetBrains Mono',monospace;color:var(--dim);
}
/* ── MAIN ── */
.main{flex:1;padding:0;overflow-y:auto;}
.main-header{
  padding:24px 32px 16px;border-bottom:1px solid var(--border);background:var(--surface);
  display:flex;justify-content:space-between;align-items:center;
}
.main-header h2{font-size:22px;font-weight:600;}
.main-header .breadcrumb{font-size:13px;color:var(--dim);margin-top:2px;}
.content{padding:24px 32px 60px;max-width:960px;}
/* ── STATS ── */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:24px;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;}
.stat-card .num{font-size:28px;font-weight:700;font-family:'JetBrains Mono',monospace;color:var(--accent2);}
.stat-card .label{font-size:12px;color:var(--dim);margin-top:2px;}
/* ── TOPIC GRID ── */
.topics-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px;}
.topic-card{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:18px;cursor:pointer;transition:box-shadow .15s;
}
.topic-card:hover{box-shadow:0 2px 8px rgba(0,0,0,0.08);}
.topic-card .icon{font-size:28px;margin-bottom:6px;}
.topic-card h3{font-size:15px;font-weight:600;}
.topic-card p{font-size:12px;color:var(--dim);margin-top:4px;}
/* ── CONCEPT VIEW ── */
.concept-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:14px;}
.concept-card h3{font-size:17px;font-weight:600;margin-bottom:8px;}
.concept-card .def{font-size:14px;color:var(--dim);margin-bottom:12px;line-height:1.7;}
.keypoints{list-style:none;padding:0;}
.keypoints li{padding:6px 0 6px 20px;position:relative;font-size:13.5px;border-bottom:1px solid var(--bg2);}
.keypoints li::before{content:"→";position:absolute;left:0;color:var(--accent2);}
/* ── QUESTIONS ── */
.q-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 20px;margin-bottom:12px;}
.q-card .q-text{font-size:14.5px;margin-bottom:10px;}
.q-card .q-opts{display:flex;flex-direction:column;gap:5px;}
.q-card .q-opt{padding:7px 10px;border-radius:4px;font-size:13.5px;border:1px solid var(--border);cursor:pointer;background:var(--bg);transition:all .1s;}
.q-card .q-opt:hover{border-color:var(--accent2);}
.q-card .q-opt.correct{background:var(--good-bg);border-color:var(--good);}
.q-card .q-opt.wrong{background:var(--bad-bg);border-color:var(--bad);}
.q-card .q-opt.locked{cursor:default;}
.q-card .q-tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;}
.q-tag{font-size:10px;background:var(--bg2);padding:1px 8px;border-radius:10px;color:var(--dim);font-family:'JetBrains Mono',monospace;}
/* ── FLASHCARD ── */
.fc-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:30px;text-align:center;margin-bottom:14px;min-height:160px;display:flex;flex-direction:column;justify-content:center;cursor:pointer;}
.fc-card .fc-front{font-size:18px;font-weight:500;}
.fc-card .fc-back{font-size:16px;color:var(--accent2);display:none;}
.fc-card.flipped .fc-front{display:none;}
.fc-card.flipped .fc-back{display:block;}
.fc-card .fc-tags{font-size:11px;color:var(--dim);margin-top:12px;}
/* ── QUIZ ── */
.quiz-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
.quiz-progress{flex:1;height:6px;background:var(--bg2);border-radius:3px;margin:0 16px;overflow:hidden;}
.quiz-progress-fill{height:100%;background:var(--accent2);transition:width .25s;}
.quiz-score{font-family:'JetBrains Mono',monospace;font-size:14px;color:var(--dim);}
/* ── SEARCH ── */
.search-box{position:relative;margin-bottom:20px;}
.search-box input{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:var(--radius);font-size:14px;background:var(--surface);}
.search-box input:focus{outline:none;border-color:var(--accent2);}
.search-results{position:absolute;top:100%;left:0;right:0;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);max-height:360px;overflow-y:auto;z-index:10;box-shadow:var(--shadow);}
.search-item{padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--bg2);font-size:13px;}
.search-item:hover{background:var(--bg2);}
.search-item .si-type{font-size:10px;color:var(--gold);font-family:'JetBrains Mono',monospace;}
/* ── BUTTONS ── */
.btn{font-family:inherit;font-size:13px;padding:8px 18px;border:1px solid var(--accent2);border-radius:var(--radius);cursor:pointer;background:none;color:var(--accent2);transition:all .12s;}
.btn:hover{background:var(--accent2);color:#fff;}
.btn-primary{background:var(--accent2);color:#fff;}
.btn-primary:hover{background:#12302e;}
.btn-sm{font-size:12px;padding:5px 12px;}
.btn-group{display:flex;gap:8px;flex-wrap:wrap;margin:14px 0;}
/* ── RESPONSIVE ── */
@media(max-width:720px){
  .sidebar{width:200px;}
  .main-header{padding:16px 20px;}
  .content{padding:16px 20px 40px;}
}
/* ── TREE ── */
.tree-item{padding:0;}
.tree-toggle{display:block;width:100%;text-align:left;padding:7px 18px 7px 28px;font-size:13px;border:none;background:none;cursor:pointer;color:var(--dim);}
.tree-toggle:hover{background:var(--bg2);}
.tree-toggle .arrow{display:inline-block;width:16px;font-size:10px;color:var(--dim);}
.tree-children{display:none;}
.tree-children.open{display:block;}
.tree-leaf{padding:7px 18px 7px 44px;font-size:13px;cursor:pointer;color:var(--ink);border:none;background:none;width:100%;text-align:left;}
.tree-leaf:hover{background:var(--bg2);}
.tree-leaf.active{background:var(--bg2);color:var(--accent2);font-weight:600;}
/* ── MISC ── */
.mb-2{margin-bottom:8px;}.mb-3{margin-bottom:14px;}.mb-4{margin-bottom:20px;}
.mt-3{margin-top:14px;}
.text-dim{color:var(--dim);font-size:13px;}
.text-sm{font-size:13px;}
.flex{display:flex;gap:10px;align-items:center;}
/* ── QUIZ COMPLETE ── */
.quiz-complete{text-align:center;padding:40px 20px;}
.quiz-complete .score{font-size:52px;font-weight:700;color:var(--accent2);font-family:'JetBrains Mono',monospace;}
.quiz-complete .sub{font-size:14px;color:var(--dim);margin-top:4px;}
/* ── tryout ── */
.tryout-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:14px;}
.tryout-card h3{font-size:15px;}
/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:6px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="layout">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="brand">
      <strong>BankSoal</strong>
      Blok Muskuloskeletal
    </div>
    <nav id="sidebarNav">
      <div class="nav-item active" data-view="home"><span class="icon">📊</span> Beranda</div>
      <div class="nav-item" data-view="materi"><span class="icon">📖</span> Materi</div>
      <div class="nav-item" data-view="soal"><span class="icon">❓</span> Bank Soal<span class="badge" id="soalCount">0</span></div>
      <div class="nav-item" data-view="kuis"><span class="icon">⚡</span> Quiz Cepat</div>
      <div class="nav-item" data-view="tryout"><span class="icon">📝</span> Try Out CBT</div>
      <div class="nav-item" data-view="flashcard"><span class="icon">🃏</span> Flashcards</div>
      <div class="nav-item" data-view="cari"><span class="icon">🔍</span> Cari</div>
    </nav>
    <div style="padding:12px 18px;border-top:1px solid var(--border);font-size:11px;color:var(--dim);">
      <span id="progressLabel">0/0 konsep dipelajari</span>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main" id="mainContent">
    <div class="main-header">
      <div>
        <h2 id="pageTitle">Beranda</h2>
        <div class="breadcrumb" id="breadcrumb">Blok Muskuloskeletal</div>
      </div>
      <div style="font-size:13px;color:var(--dim);font-family:'JetBrains Mono',monospace;">
        <span id="totalQuestions">0</span> soal · <span id="totalFlashcards">0</span> flashcard
      </div>
    </div>
    <div class="content" id="pageContent">
      <!-- Dinamis di-render oleh JS -->
    </div>
  </main>
</div>

<script src="app/data.js"></script>
<script>
// ============================================================
// STATE
// ============================================================
const state = {
  view: 'home',
  selectedTopic: null,
  selectedSubtopic: null,
  selectedConcept: null,
  quiz: {
    active: false,
    questions: [],
    idx: 0,
    score: 0,
    answers: [],
    done: false
  },
  tryout: {
    active: false,
    questions: [],
    idx: 0,
    score: 0,
    answers: [],
    timeLeft: 0,
    done: false
  },
  flashcard: {
    active: false,
    cards: [],
    idx: 0
  },
  progress: JSON.parse(localStorage.getItem('bs_progress') || '{}')
};

// ============================================================
// HELPERS
// ============================================================
function $(sel, ctx=document) { return ctx.querySelector(sel); }
function $$(sel, ctx=document) { return [...ctx.querySelectorAll(sel)]; }
function el(tag, attrs={}, ...kids) {
  const e = document.createElement(tag);
  for (const [k,v] of Object.entries(attrs)) {
    if (k.startsWith('on')) e[k]=v; else e.setAttribute(k,v);
  }
  kids.flat().forEach(k => { if(k!=null) e.append(k); });
  return e;
}
function shuffle(a){ const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[b[i],b[j]]=[b[j],b[i]];}return b; }

function saveProgress(){
  localStorage.setItem('bs_progress', JSON.stringify(state.progress));
  updateSidebarProgress();
}
function markLearned(conceptId){
  state.progress[conceptId]=true; saveProgress();
}
function isLearned(conceptId){ return !!state.progress[conceptId]; }

function letters(i){ return String.fromCharCode(65+i); }

// ============================================================
// NAVIGATION
// ============================================================
function navigate(view, params={}){
  state.view = view;
  Object.assign(state, params);
  $$('.nav-item').forEach(n => n.classList.toggle('active', n.dataset.view===view));
  render();
}

// ============================================================
// RENDER
// ============================================================
function render(){
  document.getElementById('totalQuestions').textContent = DB.allQuestions.length;
  document.getElementById('totalFlashcards').textContent = DB.allFlashcards.length;
  document.getElementById('soalCount').textContent = DB.allQuestions.length;

  const title = {home:'Beranda',materi:'Materi',soal:'Bank Soal',kuis:'Quiz Cepat',tryout:'Try Out CBT',flashcard:'Flashcards',cari:'Cari'}[state.view]||'';
  document.getElementById('pageTitle').textContent = title;
  const bc = document.getElementById('breadcrumb');
  if(state.selectedConcept){
    const con = findConcept(state.selectedConcept);
    bc.textContent = `Materi / ${con?.topicName||''} / ${con?.subtopicName||''} / ${con?.name||''}`;
  } else if(state.selectedSubtopic){
    bc.textContent = `Materi / ${state.selectedSubtopic}`;
  } else if(state.view==='materi'){
    bc.textContent = 'Materi / Jelajahi';
  } else {
    bc.textContent = 'Blok Muskuloskeletal';
  }

  const cont = document.getElementById('pageContent');
  switch(state.view){
    case 'home': renderHome(cont); break;
    case 'materi': renderMateri(cont); break;
    case 'soal': renderSoal(cont); break;
    case 'kuis': renderKuis(cont); break;
    case 'tryout': renderTryout(cont); break;
    case 'flashcard': renderFlashcard(cont); break;
    case 'cari': renderCari(cont); break;
  }
}

// ============================================================
// FIND HELPERS
// ============================================================
function findConcept(id){
  for(const t of DB.topics)
    for(const st of t.subtopics)
      for(const c of st.concepts)
        if(c.id===id) return {...c, topicId:t.id, topicName:t.name, subtopicId:st.id, subtopicName:st.name};
  return null;
}
function findSubtopicsByName(name){
  for(const t of DB.topics) for(const st of t.subtopics) if(st.name===name) return st;
  return null;
}

// ============================================================
// HOME
// ============================================================
function renderHome(cont){
  const learned = Object.keys(state.progress).length;
  const totalConcepts = DB.topics.reduce((a,t)=>a+t.subtopics.reduce((b,st)=>b+st.concepts.length,0),0);
  const doneSoal = Object.values(state.progress).filter(v=>typeof v==='boolean').length;
  cont.innerHTML = '';
  cont.append(
    el('div',{className:'stats-grid'},
      el('div',{className:'stat-card'}, el('div',{className:'num'}, DB.topics.length), el('div',{className:'label'},'Topik')),
      el('div',{className:'stat-card'}, el('div',{className:'num'}, totalConcepts), el('div',{className:'label'},'Konsep')),
      el('div',{className:'stat-card'}, el('div',{className:'num'}, DB.allQuestions.length), el('div',{className:'label'},'Soal')),
      el('div',{className:'stat-card'}, el('div',{className:'num'}, DB.allFlashcards.length), el('div',{className:'label'},'Flashcard')),
    ),
    el('h3',{style:'font-size:15px;font-weight:600;margin-bottom:12px;'},'Topik Pembelajaran'),
    el('div',{className:'topics-grid'}, ...DB.topics.map(t=>
      el('div',{className:'topic-card',onclick:()=>navigate('materi',{selectedTopic:t.id})},
        el('div',{className:'icon'}, t.icon),
        el('h3',{}, t.name),
        el('p',{}, `${t.subtopics.reduce((a,st)=>a+st.concepts.length,0)} konsep`),
        el('p',{}, `${countTopicQuestions(t.id)} soal`)
      )
    ))
  );
  updateSidebarProgress();
}

function countTopicQuestions(topicId){
  return DB.allQuestions.filter(q=>q.topicId===topicId).length;
}

// ============================================================
// MATERI
// ============================================================
function renderMateri(cont){
  cont.innerHTML = '';
  // If a concept is selected, show concept detail
  if(state.selectedConcept){
    renderConceptDetail(cont, state.selectedConcept);
    return;
  }

  // Topic tree browser
  cont.append(
    el('div',{style:'display:grid;grid-template-columns:260px 1fr;gap:20px;'},
      el('div',{style:'background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:8px 0;overflow-y:auto;max-height:calc(100vh-200px);'},
        ...DB.topics.map(t=>
          el('div',{className:'tree-item'},
            el('button',{className:'tree-toggle',onclick:function(){const n=this.nextElementSibling;n.classList.toggle('open');this.querySelector('.arrow').textContent=n.classList.contains('open')?'▾':'▸';}},
              el('span',{className:'arrow'}, '▸'), ' ', t.icon, ' ', t.name),
            el('div',{className:'tree-children'},
              ...t.subtopics.map(st=>
                el('div',{},
                  el('button',{className:'tree-toggle',style:'padding-left:44px;',onclick:function(){const n=this.nextElementSibling;n.classList.toggle('open');this.querySelector('.arrow').textContent=n.classList.contains('open')?'▾':'▸';}},
                    el('span',{className:'arrow'}, '▸'), ' ', st.name),
                  el('div',{className:'tree-children'},
                    ...st.concepts.map(c=>
                      el('button',{className:`tree-leaf${state.selectedConcept===c.id?' active':''}`,onclick:()=>navigate('materi',{selectedConcept:c.id})},
                        c.name, isLearned(c.id)?' ✓':'')
                    )
                  )
                )
              )
            )
          )
        )
      ),
      el('div',{id:'conceptPreview',style:'color:var(--dim);font-size:14px;text-align:center;padding:40px 0;'},
        'Pilih konsep dari daftar di samping untuk melihat detailnya')
    )
  );
}

function renderConceptDetail(cont, conceptId){
  const c = findConcept(conceptId);
  if(!c){ cont.innerHTML='<p>Konsep tidak ditemukan.</p>'; return; }
  markLearned(conceptId);

  const qs = DB.allQuestions.filter(q=>q.conceptId===conceptId);
  const fcs = DB.allFlashcards.filter(f=>f.conceptId===conceptId);

  const wrapper = el('div',{});
  wrapper.innerHTML = `
    <div class="concept-card">
      <h3>${c.name}</h3>
      <div class="def">${c.definition}</div>
      ${c.keyPoints?.length ? `<ul class="keypoints">${c.keyPoints.map(k=>`<li>${k}</li>`).join('')}</ul>` : ''}
      ${c.related?.length ? `<div class="text-dim mt-3">Konsep terkait: ${c.related.map(r=>`<a href="#" class="related-link" data-id="${r}">${r}</a>`).join(', ')}</div>` : ''}
    </div>
  `;

  // Questions
  if(qs.length){
    const qSection = el('div',{className:'mb-4'},
      el('h4',{style:'font-size:14px;font-weight:600;margin-bottom:10px;'}, `Soal (${qs.length})`));
    qs.forEach(q => qSection.append(renderQuestion(q, true)));
    wrapper.append(qSection);
  }

  // Flashcards
  if(fcs.length){
    const fcSection = el('div',{},
      el('h4',{style:'font-size:14px;font-weight:600;margin-bottom:10px;'}, `Flashcard (${fcs.length})`));
    fcs.forEach(f => fcSection.append(renderFlashcardMini(f)));
    wrapper.append(fcSection);
  }

  cont.innerHTML = '';
  cont.append(wrapper);
}

function renderQuestion(q, showAnswer=false){
  const card = el('div',{className:'q-card'});
  card.innerHTML = `
    <div class="q-text">${q.text}</div>
    <div class="q-opts">${q.opts.map((o,i)=>`<div class="q-opt${showAnswer?(i===q.answerIdx?' correct':' dim'):''}" data-i="${i}"><span style="font-weight:600;font-family:JetBrains Mono,monospace;">${letters(i)}.</span> ${o}</div>`).join('')}</div>
    <div class="q-tags">${q.tags.map(t=>`<span class="q-tag">#${t}</span>`).join('')}</div>
  `;
  if(!showAnswer){
    card.querySelectorAll('.q-opt').forEach(el=>{
      el.addEventListener('click', function(){
        if(this.classList.contains('locked')) return;
        const i = parseInt(this.dataset.i);
        card.querySelectorAll('.q-opt').forEach(o=>{o.classList.add('locked');if(o.dataset.i==q.answerIdx)o.classList.add('correct');});
        if(i!==q.answerIdx) this.classList.add('wrong');
        else this.classList.add('correct');
      });
    });
  }
  return card;
}

function renderFlashcardMini(f){
  const card = el('div',{className:'fc-card',style:'min-height:80px;padding:16px;cursor:pointer;',onclick:function(){this.classList.toggle('flipped');}});
  card.innerHTML = `
    <div class="fc-front">${f.front}</div>
    <div class="fc-back">${f.back}</div>
  `;
  return card;
}

// ============================================================
// SOAL (Bank Soal)
// ============================================================
function renderSoal(cont){
  const topicFilter = state.selectedTopic||'all';
  let qs = DB.allQuestions;
  if(topicFilter!=='all') qs = qs.filter(q=>q.topicId===topicFilter);

  cont.innerHTML = '';
  const filterBar = el('div',{className:'flex mb-4'});
  const sel = el('select',{style:'padding:6px 10px;border:1px solid var(--border);border-radius:var(--radius);font-size:13px;background:var(--surface);',
    onchange:function(){navigate('soal',{selectedTopic:this.value});}});
  sel.innerHTML = '<option value="all">Semua Topik</option>'+DB.topics.map(t=>`<option value="${t.id}"${t.id===topicFilter?' selected':''}>${t.icon} ${t.name}</option>`).join('');
  filterBar.append(sel, el('span',{className:'text-dim'}, `${qs.length} soal`));

  // Show by concept
  const byConcept = {};
  qs.forEach(q => {
    const key = q.conceptName;
    if(!byConcept[key]) byConcept[key] = [];
    byConcept[key].push(q);
  });

  const list = el('div',{});
  for(const [concept, questions] of Object.entries(byConcept)){
    list.append(
      el('div',{className:'text-sm',style:'font-weight:600;margin:16px 0 8px;color:var(--accent2);'},
        `📌 ${concept} (${questions.length} soal)`),
      ...questions.map(q => renderQuestion(q, false))
    );
  }
  cont.append(filterBar, list);
}

// ============================================================
// KUIS (Quiz Cepat)
// ============================================================
function renderKuis(cont){
  if(state.quiz.done){
    cont.innerHTML = `
      <div class="quiz-complete">
        <div class="score">${state.quiz.score}/${state.quiz.questions.length}</div>
        <div class="sub">Quiz selesai! ${state.quiz.score===state.quiz.questions.length?'🎉 Sempurna!':''}</div>
        <div class="btn-group" style="justify-content:center;margin-top:16px;">
          <button class="btn" onclick="startQuiz()">Ulangi</button>
          <button class="btn btn-primary" onclick="startQuiz(undefined,true)">Soal Baru</button>
        </div>
      </div>
    `;
    return;
  }

  if(!state.quiz.active){
    cont.innerHTML = `
      <div style="text-align:center;padding:40px 0;">
        <p style="font-size:18px;margin-bottom:16px;">Quiz Cepat — acak dari semua soal</p>
        <div class="btn-group" style="justify-content:center;">
          <button class="btn btn-primary" onclick="startQuiz()">Mulai Quiz (10 soal)</button>
          <button class="btn" onclick="startQuiz(20)">20 soal</button>
          <button class="btn" onclick="startQuiz(0)">Semua soal</button>
        </div>
        <div class="text-dim mt-3">Soal ditampilkan acak. Pilih jawaban, langsung lihat hasilnya.</div>
      </div>
    `;
    return;
  }

  const qs = state.quiz.questions;
  const idx = state.quiz.idx;
  if(idx >= qs.length){
    state.quiz.done = true;
    renderKuis(cont);
    return;
  }
  const q = qs[idx];
  const ans = state.quiz.answers[idx];
  const isLocked = ans !== undefined;

  cont.innerHTML = `
    <div class="quiz-header">
      <span class="text-dim">Soal ${idx+1}/${qs.length}</span>
      <div class="quiz-progress"><div class="quiz-progress-fill" style="width:${((idx+1)/qs.length*100)}%"></div></div>
      <span class="quiz-score">${state.quiz.score} ✓</span>
    </div>
    <div class="q-card">
      <div class="q-text">${q.text}</div>
      <div class="q-tags">${q.tags.map(t=>`<span class="q-tag">#${t}</span>`).join('')}</div>
      <div class="q-opts mt-3">
        ${q.opts.map((o,i)=>{
          let cls='q-opt';
          if(isLocked){
            cls+=' locked';
            if(i===q.answerIdx) cls+=' correct';
            else if(i===ans) cls+=' wrong';
          }
          return `<div class="${cls}" data-i="${i}"><span style="font-weight:600;font-family:JetBrains Mono,monospace;">${letters(i)}.</span> ${o}</div>`;
        }).join('')}
      </div>
      ${isLocked ? `<div style="margin-top:10px;font-size:13px;${ans===q.answerIdx?'color:var(--good)':'color:var(--bad)'}">${ans===q.answerIdx?'✓ Benar!':'✕ Jawaban: '+letters(q.answerIdx)}</div>` : ''}
    </div>
    ${isLocked ? `<div class="flex" style="justify-content:flex-end;"><button class="btn btn-primary btn-sm" onclick="nextQuizQuestion()">${idx+1>=qs.length?'Lihat Nilai':'Selanjutnya →'}</button></div>` : ''}
  `;

  if(!isLocked){
    cont.querySelectorAll('.q-opt').forEach(el=>{
      el.addEventListener('click', function(){
        const i = parseInt(this.dataset.i);
        state.quiz.answers[idx] = i;
        if(i===q.answerIdx) state.quiz.score++;
        renderKuis(cont);
      });
    });
  }
}

function startQuiz(count=10, newQ=false){
  state.quiz.active = true;
  state.quiz.done = false;
  state.quiz.idx = 0;
  state.quiz.score = 0;
  state.quiz.answers = [];
  let pool = [...DB.allQuestions];
  if(newQ) pool = shuffle(pool);
  if(count>0) pool = pool.slice(0, Math.min(count, pool.length));
  state.quiz.questions = shuffle(pool);
  state.quiz.answers = new Array(state.quiz.questions.length).fill(undefined);
  navigate('kuis');
}
function nextQuizQuestion(){
  state.quiz.idx++;
  if(state.quiz.idx >= state.quiz.questions.length){
    state.quiz.done = true;
  }
  render();
}

// ============================================================
// TRY OUT (CBT)
// ============================================================
function renderTryout(cont){
  if(state.tryout.done){
    const to = state.tryout;
    cont.innerHTML = `
      <div class="quiz-complete">
        <div class="score">${to.score}/${to.questions.length}</div>
        <div class="sub">Try Out selesai! Waktu: ${formatTime(to.timeLimit || 0)}</div>
        <div class="btn-group" style="justify-content:center;margin-top:16px;">
          <button class="btn" onclick="startTryout()">Ulangi</button>
        </div>
      </div>
    `;
    return;
  }

  if(!state.tryout.active){
    cont.innerHTML = `
      <div style="text-align:center;padding:40px 0;">
        <p style="font-size:18px;margin-bottom:16px;">Try Out CBT — simulasi ujian</p>
        <div class="tryout-card" style="text-align:left;">
          <h3>Pilih Mode</h3>
          <div class="btn-group mt-3">
            ${DB.topics.map(t=>`<button class="btn" onclick="startTryout('${t.id}')">${t.icon} ${t.name}</button>`).join('')}
            <button class="btn btn-primary" onclick="startTryout('all')">📋 Semua Topik</button>
          </div>
          <div class="text-dim mt-3">Try Out: 30 soal, timer 30 menit, tampilan seperti CBT.</div>
        </div>
      </div>
    `;
    return;
  }

  const to = state.tryout;
  const qs = to.questions;
  const idx = to.idx;
  if(idx >= qs.length || to.timeLeft <= 0){
    state.tryout.done = true;
    renderTryout(cont);
    return;
  }
  const q = qs[idx];
  const ans = to.answers[idx];
  const isLocked = ans !== undefined;

  cont.innerHTML = `
    <div class="quiz-header">
      <span class="text-dim">Soal ${idx+1}/${qs.length}</span>
      <div class="quiz-progress"><div class="quiz-progress-fill" style="width:${((idx+1)/qs.length*100)}%"></div></div>
      <span id="timerDisplay" style="font-family:JetBrains Mono,monospace;font-size:16px;font-weight:600;color:var(--accent);">${formatTime(to.timeLeft)}</span>
    </div>
    <div class="q-card">
      <div class="q-text">${q.text}</div>
      <div class="q-opts mt-3">
        ${q.opts.map((o,i)=>{
          let cls='q-opt';
          if(isLocked){
            cls+=' locked';
            if(i===q.answerIdx) cls+=' correct';
            else if(i===ans) cls+=' wrong';
          }
          return `<div class="${cls}" data-i="${i}"><span style="font-weight:600;font-family:JetBrains Mono,monospace;">${letters(i)}.</span> ${o}</div>`;
        }).join('')}
      </div>
    </div>
    ${isLocked ? `<div class="flex" style="justify-content:flex-end;"><button class="btn btn-primary btn-sm" onclick="nextTryoutQuestion()">${idx+1>=qs.length?'Selesai':'Selanjutnya →'}</button></div>` : ''}
    <div class="flex" style="margin-top:8px;flex-wrap:wrap;gap:4px;">
      ${qs.map((_,i)=>`<button class="btn btn-sm" style="padding:3px 8px;background:${to.answers[i]!==undefined?'var(--accent2)':'var(--bg2)'};color:${to.answers[i]!==undefined?'white':'var(--dim)'};${i===idx?'border-color:var(--accent);':''}" onclick="goToTryoutQuestion(${i})">${i+1}</button>`).join('')}
    </div>
  `;

  if(!isLocked){
    cont.querySelectorAll('.q-opt').forEach(el=>{
      el.addEventListener('click', function(){
        const i = parseInt(this.dataset.i);
        to.answers[idx] = i;
        if(i===q.answerIdx) to.score++;
        renderTryout(cont);
      });
    });
  }
}

function startTryout(topicId='all'){
  let pool = topicId==='all' ? [...DB.allQuestions] : DB.allQuestions.filter(q=>q.topicId===topicId);
  pool = shuffle(pool).slice(0, 30);
  state.tryout = {
    active: true, done: false, questions: pool, idx: 0, score: 0,
    answers: new Array(pool.length).fill(undefined), timeLeft: 1800, timeLimit: 1800
  };
  if(typeof tryoutTimer !== 'undefined') clearInterval(tryoutTimer);
  tryoutTimer = setInterval(()=>{
    if(state.tryout.done || !state.tryout.active){ clearInterval(tryoutTimer); return; }
    state.tryout.timeLeft--;
    if(state.tryout.timeLeft<=0){ state.tryout.done=true; render(); }
    else { const t = document.getElementById('timerDisplay'); if(t) t.textContent = formatTime(state.tryout.timeLeft); }
  },1000);
  navigate('tryout');
}
function nextTryoutQuestion(){
  state.tryout.idx++;
  if(state.tryout.idx >= state.tryout.questions.length) state.tryout.done = true;
  render();
}
function goToTryoutQuestion(i){ state.tryout.idx = i; render(); }
function formatTime(s){ const m=Math.floor(s/60); const sec=s%60; return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`; }
let tryoutTimer = null;

// ============================================================
// FLASHCARD
// ============================================================
function renderFlashcard(cont){
  if(state.flashcard.active && state.flashcard.cards.length===0){
    state.flashcard.active = false;
  }

  if(!state.flashcard.active){
    cont.innerHTML = `
      <div style="text-align:center;padding:40px 0;">
        <p style="font-size:18px;margin-bottom:16px;">Flashcards — ${DB.allFlashcards.length} kartu</p>
        <div class="btn-group" style="justify-content:center;">
          <button class="btn btn-primary" onclick="startFlashcards('all')">Semua (${DB.allFlashcards.length})</button>
          ${DB.topics.map(t=>`<button class="btn" onclick="startFlashcards('${t.id}')">${t.icon} ${t.name}</button>`).join('')}
        </div>
      </div>
    `;
    return;
  }

  const cards = state.flashcard.cards;
  const idx = state.flashcard.idx;
  if(cards.length===0 || idx>=cards.length){
    state.flashcard.active = false;
    renderFlashcard(cont);
    return;
  }
  const card = cards[idx];

  cont.innerHTML = `
    <div style="text-align:center;max-width:600px;margin:0 auto;">
      <div class="text-dim mb-3">${idx+1}/${cards.length}</div>
      <div class="fc-card" id="flashcardEl" onclick="this.classList.toggle('flipped');">
        <div class="fc-front">${card.front}</div>
        <div class="fc-back">${card.back}</div>
        <div class="fc-tags">${card.conceptName} · ${card.topicName}</div>
      </div>
      <div class="btn-group" style="justify-content:center;">
        <button class="btn btn-sm" onclick="prevFlashcard()">←</button>
        <button class="btn btn-primary btn-sm" onclick="nextFlashcard()">→</button>
      </div>
      <div class="btn-group" style="justify-content:center;margin-top:8px;">
        <button class="btn btn-sm" onclick="startFlashcards('${state.flashcard.topicId||'all'}')">Acak Ulang</button>
      </div>
    </div>
  `;
}

function startFlashcards(topicId='all'){
  let cards = topicId==='all' ? [...DB.allFlashcards] : DB.allFlashcards.filter(f=>f.topicId===topicId);
  state.flashcard = { active: true, cards: shuffle(cards), idx: 0, topicId };
  navigate('flashcard');
}
function nextFlashcard(){ state.flashcard.idx++; render(); }
function prevFlashcard(){ if(state.flashcard.idx>0) state.flashcard.idx--; render(); }

// ============================================================
// SEARCH
// ============================================================
function renderCari(cont){
  cont.innerHTML = `
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Cari konsep, soal, flashcard..." autofocus>
      <div class="search-results" id="searchResults"></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
      <div class="tryout-card">
        <h3>💰 Tips</h3>
        <p class="text-sm text-dim mt-2">Cari kata kunci seperti "osteoblas", "foramen", "carpal tunnel", "klumpke", dll.</p>
      </div>
      <div class="tryout-card">
        <h3>🏷️ Topik</h3>
        <p class="text-sm text-dim mt-2">Atau klik topik untuk browsing: ${DB.topics.map(t=>`<a href="#" onclick="navigate('materi',{selectedTopic:'${t.id}'})">${t.icon} ${t.name}</a>`).join(', ')}</p>
      </div>
    </div>
  `;

  const input = document.getElementById('searchInput');
  const results = document.getElementById('searchResults');
  let timeout;

  input.addEventListener('input', function(){
    clearTimeout(timeout);
    timeout = setTimeout(()=>search(this.value, results), 200);
  });
}

function search(query, container){
  if(!query || query.length<2){ container.innerHTML=''; container.style.display='none'; return; }
  const q = query.toLowerCase();

  const concepts = [];
  const questions = [];
  const flashcards = [];

  DB.topics.forEach(t=>{
    t.subtopics.forEach(st=>{
      st.concepts.forEach(c=>{
        if(c.name.toLowerCase().includes(q) || c.definition.toLowerCase().includes(q)){
          concepts.push({id:c.id, name:c.name, topic:t.name, subtopic:st.name});
        }
        c.questions.forEach(qq=>{
          if(qq.text.toLowerCase().includes(q) || qq.tags.some(t=>t.includes(q))){
            questions.push({text:qq.text.substring(0,80)+'...', concept:c.name, topic:t.name, answerIdx:qq.answerIdx});
          }
        });
        c.flashcards.forEach(f=>{
          if(f.front.toLowerCase().includes(q) || f.back.toLowerCase().includes(q)){
            flashcards.push({front:f.front, back:f.back, concept:c.name});
          }
        });
      });
    });
  });

  let html = '';
  if(concepts.length){
    html += '<div style="padding:6px 14px;font-size:11px;color:var(--gold);font-weight:600;">KONSEP</div>';
    html += concepts.slice(0,5).map(c=>`<div class="search-item" onclick="navigate('materi',{selectedConcept:'${c.id}'})"><span class="si-type">${c.topic} / ${c.subtopic}</span><br>${c.name}</div>`).join('');
  }
  if(questions.length){
    html += '<div style="padding:6px 14px;font-size:11px;color:var(--gold);font-weight:600;">SOAL</div>';
    html += questions.slice(0,5).map(q=>`<div class="search-item" onclick="navigate('soal',{selectedTopic:'${query}'})"><span class="si-type">${q.topic}</span><br>${q.text}</div>`).join('');
  }
  if(flashcards.length){
    html += '<div style="padding:6px 14px;font-size:11px;color:var(--gold);font-weight:600;">FLASHCARD</div>';
    html += flashcards.slice(0,5).map(f=>`<div class="search-item"><span class="si-type">${f.concept}</span><br>${f.front}</div>`).join('');
  }
  if(!html) html = '<div class="search-item" style="color:var(--dim);">Tidak ditemukan</div>';

  container.innerHTML = html;
  container.style.display = 'block';

  // Handle related concept links
  container.querySelectorAll('.search-item').forEach(el=>{
    if(el.hasAttribute('onclick')) return;
    el.addEventListener('click', function(){
      input.value = this.textContent.trim().split('\n')[0];
      container.style.display = 'none';
    });
  });
}

// ============================================================
// SIDEBAR PROGRESS
// ============================================================
function updateSidebarProgress(){
  const total = DB.topics.reduce((a,t)=>a+t.subtopics.reduce((b,st)=>b+st.concepts.length,0),0);
  const learned = Object.keys(state.progress).length;
  document.getElementById('progressLabel').textContent = `${learned}/${total} konsep dipelajari`;
}

// ============================================================
// INIT
// ============================================================
document.addEventListener('click', function(e){
  // Handle related concept links
  if(e.target.classList.contains('related-link')){
    e.preventDefault();
    navigate('materi', {selectedConcept: e.target.dataset.id});
  }
});

// Initialize sidebar navigation
$$('.nav-item[data-view]').forEach(el=>{
  el.addEventListener('click', function(){ navigate(this.dataset.view); });
});

render();
</script>
